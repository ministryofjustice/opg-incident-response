name: "[Workflow] Path to Live"

concurrency:
  group: pull-request-workflow

on:
  push:
    branches:
      - main # match main

permissions:
  id-token: write
  contents: write
  security-events: write
  pull-requests: read
  actions: none
  checks: none
  deployments: none
  issues: none
  packages: none
  repository-projects: none
  statuses: none

defaults:
  run:
    shell: bash

jobs:
  workflow_variables:
    runs-on: ubuntu-latest
    name: output workflow variables
    outputs:
      parsed_branch: main
      version_tag: ${{ steps.semver_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: "0"

      - name: generate semver tag for release
        id: semver_tag
        uses: ministryofjustice/opg-github-actions/actions/semver@77bb12e7fec3bcee9a6a35cb21361195e027a12a # v4.9.0
        with:
          prerelease: false
          default_bump: "minor"

  build_scan_push_containers:
    name: Docker Build, Scan and Push
    uses: ./.github/workflows/_build.yml
    needs: [workflow_variables]
    with:
      tag: ${{ needs.workflow_variables.outputs.version_tag }}
      branch_name: ${{ needs.workflow_variables.outputs.parsed_branch }}

  unit_test:
    name: Run Tests
    uses: ./.github/workflows/_test.yml

  deploy_to_production_environment:
    name: Deploy to Production Environment
    needs: [
      workflow_variables,
      build_scan_push_containers,
      unit_test
    ]
    uses: ./.github/workflows/_deploy.yml
    with:
      workspace: production
      image_tag: ${{ needs.workflow_variables.outputs.version_tag }}
      account_name: production
      apply: true

  smoke_test:
    name: Check Website Availability
    needs: [
      workflow_variables,
      deploy_to_production_environment
    ]
    uses: ./.github/workflows/_smoke.yml
    with:
      url: https://incident.opg.service.justice.gov.uk/ht/

  end_of_pr_workflow:
    name: end of workflow
    runs-on: ubuntu-latest
    needs: [workflow_variables,smoke_test]
    steps:
      - name: End of PR Workflow
        run: echo "${{ needs.workflow_variables.outputs.version_tag }} tested, built and deployed to Production"
